<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<title>ROXY.JS — 3D Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14100c;--ink:#f3ece4;--muted:#a8978a;--faint:#6f635a;--line:rgba(255,255,255,.10);
  --panel:rgba(24,19,15,.86);--card:rgba(255,255,255,.045);--pink:#ff8fb1;--pink2:#ff6f9c;--ok:#9be0b0;--err:#ff9b9b;
  --rail:64px;--side:320px;--bar:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
  font-family:"Space Grotesk",system-ui,sans-serif;font-size:14px}
button{font-family:inherit;color:var(--ink);cursor:pointer;border:1px solid var(--line);background:var(--card);
  border-radius:10px;padding:9px 11px;font-size:13px;transition:background .14s,border-color .14s,transform .04s}
button:hover{background:rgba(255,255,255,.10)}button:active{transform:translateY(1px)}
button:focus-visible{outline:2px solid var(--pink);outline-offset:2px}
button.pri{background:var(--pink);color:#2a141d;border-color:transparent;font-weight:600}
button.pri:hover{background:#ffa3c0}
button.on{background:rgba(255,143,177,.18);border-color:rgba(255,143,177,.45);color:#ffd4e2}
input[type=range]{width:100%;accent-color:var(--pink)}
input[type=text],input[type=number],select{font-family:inherit;font-size:13px;color:var(--ink);background:rgba(0,0,0,.28);
  border:1px solid var(--line);border-radius:9px;padding:8px 9px;width:100%}
input[type=color]{width:34px;height:30px;border:1px solid var(--line);border-radius:8px;background:none;padding:2px}
label.fld{display:block;font-size:11px;letter-spacing:.04em;color:var(--muted);margin:0 0 5px}
.tap-edit{cursor:pointer;border-bottom:1px dashed var(--faint);padding-bottom:1px}
.tap-edit:hover{color:var(--ink);border-bottom-color:var(--pink)}
.spread{display:flex;gap:8px;align-items:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px}
.muted{color:var(--muted)}.small{font-size:11.5px}
hr.sep{border:none;border-top:1px solid var(--line);margin:12px 0}

#app{position:fixed;inset:0;display:grid;grid-template-columns:var(--rail) 1fr var(--side);grid-template-rows:var(--bar) 1fr;
  grid-template-areas:"bar bar bar" "rail stage panel";}
#bar{grid-area:bar;display:flex;align-items:center;gap:10px;padding:0 12px;border-bottom:1px solid var(--line);
  background:linear-gradient(rgba(32,25,18,.72),rgba(24,19,15,.58));
  backdrop-filter:blur(18px) saturate(1.6);-webkit-backdrop-filter:blur(18px) saturate(1.6);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);z-index:5}
#bar .logo{font:600 14px/1 "Space Grotesk",sans-serif;letter-spacing:.08em;text-transform:uppercase}
#bar .vtitle{font-size:12px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}
#bar .sp{flex:1}
#bar .act{padding:7px 9px;font-size:12px}

#rail{grid-area:rail;display:flex;flex-direction:column;gap:4px;padding:8px 6px;border-right:1px solid var(--line);background:var(--panel)}
#rail .tab{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;border-radius:12px;
  padding:9px 4px;color:var(--muted);font-size:9.5px;letter-spacing:.04em}
#rail .tab .ic{width:22px;height:22px;display:block}
#rail .tab.on{color:var(--ink);background:var(--card)}
#rail .tab.on .ic{filter:drop-shadow(0 0 6px rgba(255,143,177,.5))}

#stage{grid-area:stage;position:relative;overflow:hidden;-webkit-touch-callout:none;background:
  radial-gradient(120% 120% at 50% 20%, #241b14 0%, #160f0b 60%, #0e0a07 100%)}
.view{position:absolute;inset:0;display:none}
.view.on{display:block}
.gl-slot{position:absolute;inset:0}
canvas{display:block;touch-action:none}

/* paint view split */
.view[data-view=paint]{display:none}
.view[data-view=paint].on{display:grid;grid-template-columns:1fr 360px}
.view[data-view=paint].on.mode3d{grid-template-columns:1fr}
.view[data-view=paint].on.mode3d .paint2d{display:none}
.paint2d{position:relative;display:flex;align-items:center;justify-content:center;background:#0d0a07;overflow:hidden}
.paint2d canvas{max-width:96%;max-height:96%;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.paint-prev{position:relative;border-left:1px solid var(--line)}

#panel{grid-area:panel;border-left:1px solid var(--line);background:var(--panel);overflow:auto;padding:14px}
#panel h2{font:600 13px/1.1 "Space Grotesk";margin:0 0 2px}
#panel .sub{font-size:11.5px;color:var(--muted);margin:0 0 12px}
.section-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:14px 0 8px}
.sec-toggle{display:flex;align-items:center;cursor:pointer;user-select:none;padding:3px 0}
.sec-toggle::after{content:'▾';margin-left:auto;font-size:10px;opacity:.55;transition:transform .16s}
.sec-toggle.closed::after{transform:rotate(-90deg)}

#tabbar{display:none}
#navMask{display:none}
#sheetHandle{display:none}

.assets-body{position:absolute;inset:0;overflow:auto;padding:18px}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:10px}
.thumb{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px}
.thumb-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--line);
  background:radial-gradient(120% 120% at 50% 20%,#2a2018 0%,#17110c 100%)}
.thumb .nm{font-weight:600}.thumb .mt{font-size:11px;color:var(--muted)}
.modlist{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.modrow{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 10px}
.modrow .top{display:flex;align-items:center;gap:8px}
.modrow .nm{flex:1;font-weight:500;font-size:12.5px}
.pill{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 7px}
.dbitem{display:flex;align-items:center;gap:8px;padding:8px 9px;border:1px solid var(--line);border-radius:10px;background:var(--card);margin-bottom:6px}
.dbitem .nm{flex:1}.dbitem .tg{font-size:10px;color:var(--faint)}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(34,26,19,.68);border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(16px) saturate(1.6);-webkit-backdrop-filter:blur(16px) saturate(1.6);
  box-shadow:0 8px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.14);
  color:var(--ink);padding:9px 14px;border-radius:999px;font-size:12.5px;z-index:50;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.fab{position:absolute;right:16px;bottom:16px;width:52px;height:52px;border-radius:50%;background:var(--pink);color:#2a141d;
  border:none;font-size:24px;font-weight:600;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.45),inset 0 -6px 12px rgba(0,0,0,.12);z-index:6}
.chiprow{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;padding:7px 10px;border:1px solid var(--line);border-radius:999px;background:var(--card)}
.chip.on{background:rgba(255,143,177,.16);border-color:rgba(255,143,177,.4)}
#boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:99;
  font-size:14px;color:var(--muted);text-align:center;padding:24px}

/* Base (desktop) sizing for the zoom knob — declared here, before the mobile
   media query, so the mobile-only overrides for these same properties actually
   win on mobile instead of losing to a same-specificity rule declared later. */
#zoomKnob{position:absolute;right:18px;top:100px;display:none;flex-direction:column;align-items:center;gap:3px;z-index:8;width:28px;
  padding:5px 0;border-radius:999px;background:rgba(26,20,14,.5);border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(16px) saturate(1.6);-webkit-backdrop-filter:blur(16px) saturate(1.6);
  box-shadow:0 6px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.14)}
.zk-btn{width:26px;height:26px;border-radius:50%;background:transparent;border:none;color:rgba(255,255,255,.85);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;line-height:1;padding:0;font-family:inherit}
#zkSlider{writing-mode:vertical-lr;direction:rtl;width:26px;height:80px;cursor:ns-resize;accent-color:rgba(255,143,177,.8);touch-action:none}
/* Same reasoning: the mobile override only sets `bottom` (to clear the tabbar),
   so the rest of this rule must come first or that override loses the cascade. */
#paintHud{position:absolute;left:12px;bottom:14px;display:none;align-items:center;gap:9px;z-index:8;
  padding:8px 11px;border-radius:16px;background:rgba(26,20,14,.55);border:1px solid rgba(255,255,255,.13);
  backdrop-filter:blur(18px) saturate(1.6);-webkit-backdrop-filter:blur(18px) saturate(1.6);
  box-shadow:0 6px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.14)}

/* ---------- mobile ---------- */
@media (max-width:820px){
  :root{--side:0px;--bar:52px}
  #app{grid-template-columns:1fr;grid-template-rows:var(--bar) 1fr;grid-template-areas:"bar" "stage"}
  #rail{display:none}
  /* finger-sized touch targets */
  button{min-height:42px;font-size:13.5px}
  #bar{gap:6px;padding:0 8px}
  #bar .vtitle{display:none} /* active tab in the dock already names the view */
  #bar .act{min-height:38px;padding:8px 10px}
  /* Below ~360px (iPhone SE 1st/2nd/3rd gen, some budget Android phones) the top bar's
     logo + Undo/Redo/Snap/Frame/Shot no longer fit; #bar has no wrap/scroll, so the last
     button silently clips off-screen with no way to reach it. Tighten spacing only at
     this width rather than shrinking touch targets everywhere. */
  .chip{min-height:36px}
  .hud-btn{min-height:36px}
  input[type=text],input[type=number],select{min-height:42px;font-size:14px}
  input[type=color]{width:44px;height:38px}
  .zk-btn{width:32px;height:32px;min-height:32px;font-size:19px}
  #zoomKnob{width:34px}
  /* Responsive slider length: caps at 96px on tall viewports, shrinks continuously
     on short (landscape) ones so the knob (anchored below RotBall) never extends
     down far enough to be covered by the tabbar, with a 32px usability floor. */
  #zkSlider{width:32px;height:min(96px,max(24px,calc(100vh - 320px)))}
  .view[data-view=paint].on{grid-template-columns:1fr;grid-template-rows:1fr}
  .paint-prev{display:none}
  .view[data-view=paint].on.mode3d .paint-prev{display:block}
  #panel{position:fixed;left:8px;right:8px;bottom:calc(78px + env(safe-area-inset-bottom));top:auto;height:60vh;
    border:1px solid rgba(255,255,255,.13);border-radius:24px;
    background:linear-gradient(rgba(38,29,21,.62),rgba(22,17,13,.74));
    backdrop-filter:blur(26px) saturate(1.7);-webkit-backdrop-filter:blur(26px) saturate(1.7);
    transform:translateY(calc(100% - 48px));transition:transform .26s cubic-bezier(.2,.8,.2,1);z-index:20;
    box-shadow:0 18px 48px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.16)}
  #panel.open{transform:translateY(0)}
  #sheetHandle{display:flex;align-items:center;justify-content:center;gap:8px;height:38px;margin:-6px -14px 6px;cursor:grab;touch-action:none}
  #sheetHandle .bar{width:48px;height:5px;border-radius:99px;background:var(--faint)}
  #sheetHandle .lbl{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  /* Covers the thin slivers around the tabbar (above/below it, within the panel's
     reserved bottom offset) so the collapsed sheet's peek can never show real
     content through them — the gap there is fixed-size regardless of viewport
     height, but a short (landscape) viewport shrinks the panel enough that real
     text lands in exactly that gap instead of blank space. */
  #navMask{display:block;position:fixed;left:0;right:0;bottom:0;height:calc(78px + env(safe-area-inset-bottom));
    background:var(--bg);z-index:25;pointer-events:none}
  #tabbar{display:flex;position:fixed;left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));height:62px;
    border:1px solid rgba(255,255,255,.13);border-radius:26px;padding:0 4px;
    background:linear-gradient(rgba(40,31,22,.58),rgba(20,15,11,.72));
    backdrop-filter:blur(26px) saturate(1.8);-webkit-backdrop-filter:blur(26px) saturate(1.8);
    box-shadow:0 12px 34px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.17);z-index:30}
  #tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;
    border:none;color:var(--muted);font-size:9.5px;letter-spacing:.03em;margin:6px 2px;border-radius:20px;
    transition:background .18s,color .18s}
  #tabbar .tab .ic{width:21px;height:21px}
  #tabbar .tab.on{color:var(--pink);background:rgba(255,143,177,.13);box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}
  .fab{bottom:calc(86px + env(safe-area-inset-bottom))}
  .toast{bottom:calc(86px + env(safe-area-inset-bottom))}
  #paintHud{bottom:calc(134px + env(safe-area-inset-bottom))}
}
@media (max-width:359px){
  #bar{gap:3px;padding:0 6px}
  #bar .logo{font-size:12px}
  #bar .act{padding:8px 6px}
}
@media (max-width:820px){ .desktop-only{display:none} }
@media (min-width:821px){ .mobile-only{display:none} }
/* Respect the OS "reduce motion" setting: the bottom sheet's translateY slide and every
   other transition snap to near-instant for vestibular-sensitive users. Default (motion
   allowed) is untouched — this whole block is inert unless the user has opted in. */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
}

/* ---------- edit HUD ---------- */
#editHud{position:absolute;left:0;right:0;bottom:16px;display:none;flex-direction:column;align-items:center;gap:8px;z-index:7;pointer-events:none}
#editHud.on{display:flex}
.hud-row{display:flex;gap:6px;pointer-events:auto;flex-wrap:wrap;justify-content:center}
.hud-btn{font-family:inherit;background:rgba(26,20,14,.58);border:1px solid rgba(255,255,255,.15);color:var(--ink);
  border-radius:12px;padding:10px 14px;font-size:13px;cursor:pointer;
  backdrop-filter:blur(16px) saturate(1.6);-webkit-backdrop-filter:blur(16px) saturate(1.6);
  box-shadow:0 4px 14px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.13);
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background .12s,border-color .12s,transform .06s}
.hud-btn.on{background:rgba(255,143,177,.22);border-color:rgba(255,143,177,.5);color:#ffd4e2}
.hud-btn:active{transform:scale(.93)}
.hud-sel{font-size:11.5px;color:rgba(255,212,226,.85);background:rgba(18,14,10,.78);padding:4px 12px;
  border-radius:999px;border:1px solid rgba(255,143,177,.28);pointer-events:none;backdrop-filter:blur(8px)}
.hud-srow{align-items:center}
.hud-range{width:150px;pointer-events:auto;touch-action:none}
.hud-slbl{font-size:11px;color:#ffd4e2;background:rgba(18,14,10,.85);padding:6px 9px;border-radius:8px;pointer-events:none}
.hud-sval{font-size:11px;color:rgba(255,212,226,.85);min-width:30px;text-align:center;pointer-events:none}
.hud-compact{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;justify-content:flex-start;max-width:100%;scrollbar-width:none}
.hud-compact::-webkit-scrollbar{display:none}
/* Only applied (via JS, once actual overflow is measured) to rows with more buttons than fit —
   fades the trailing edge so it reads as "swipe for more" instead of looking like clipped layout.
   The "..." HUD-expand toggle lives at the end of this row and was otherwise invisible off-screen. */
.hud-compact.has-overflow{mask-image:linear-gradient(to right,#000 calc(100% - 28px),transparent 100%);
  -webkit-mask-image:linear-gradient(to right,#000 calc(100% - 28px),transparent 100%)}
/* right:98px clears RotBall (right:12px, 80px wide) with a real gap — it was 90px,
   2px short of RotBall's own left edge, so the HUD row's fade-scroll edge touched the
   orbit gizmo's circle instead of stopping cleanly before it. */
@media(max-width:820px){#editHud{top:8px;bottom:auto;gap:5px;left:0;right:98px;align-items:flex-start;padding-left:8px}.hud-btn{font-size:11px;padding:6px 10px}.hud-range{width:110px}}
#rotBall{position:absolute;right:12px;top:12px;width:80px;height:80px;cursor:grab;display:none;z-index:8;touch-action:none;border-radius:50%}
#zoomKnob.on{display:flex}
#paintHud.on{display:flex}
#phColor{width:34px;height:32px;border:1px solid var(--line);border-radius:9px;background:none;padding:2px}
#phSize{width:120px;touch-action:none}
#phErase,#phEyedrop{font-size:12px;padding:8px 11px;min-height:0!important}
#hint{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);max-width:88%;z-index:9;
  padding:9px 14px;border-radius:999px;font-size:12px;color:rgba(255,236,244,.92);text-align:center;cursor:pointer;
  background:rgba(26,20,14,.6);border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(16px) saturate(1.6);-webkit-backdrop-filter:blur(16px) saturate(1.6);
  box-shadow:0 6px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.15);
  opacity:0;pointer-events:none;transition:opacity .35s}
#hint.show{opacity:1;pointer-events:auto}
@media (max-width:820px){#hint{bottom:calc(134px + env(safe-area-inset-bottom))}}
#quickUndo{display:none}
@media (max-width:820px){
  #quickUndo{position:absolute;left:10px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:9px;z-index:8}
  #quickUndo.off{display:none}
  #quickUndo button{width:44px;height:44px;min-height:0;border-radius:50%;font-size:19px;line-height:1;padding:0;
    background:rgba(26,20,14,.5);border:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.85);
    backdrop-filter:blur(16px) saturate(1.6);-webkit-backdrop-filter:blur(16px) saturate(1.6);
    box-shadow:0 6px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.14)}
}
</style>
</head>
<body>
<div id="boot">loading studio…</div>

<div id="app" aria-hidden="false">
  <header id="bar">
    <span class="logo">ROXY.JS</span>
    <span class="vtitle" id="vtitle">Viewer</span>
    <span class="small muted desktop-only" id="stat" style="margin-left:6px"></span>
    <span class="sp"></span>
    <button class="act" id="btnUndo" title="Undo (Ctrl+Z)" style="font-size:15px;line-height:1">↶</button>
    <button class="act" id="btnRedo" title="Redo (Ctrl+Y)" style="font-size:15px;line-height:1">↷</button>
    <button class="act" id="btnSnap" title="Grid snap">Snap</button>
    <button class="act" id="btnFrame" title="Frame">Frame</button>
    <button class="act" id="btnShot" title="Screenshot">Shot</button>
  </header>

  <nav id="rail"></nav>

  <main id="stage">
    <section class="view on" data-view="viewer"><div class="gl-slot" id="slot-viewer"></div></section>
    <section class="view" data-view="paint">
      <div class="paint2d"><canvas id="paintCanvas" width="1024" height="1024"></canvas></div>
      <div class="paint-prev gl-slot" id="slot-paint"></div>
    </section>
    <section class="view" data-view="build"><div class="gl-slot" id="slot-build"></div><button class="fab" id="fabBuild" title="Add a cube" aria-label="Add a cube">+</button></section>
    <section class="view" data-view="scene"><div class="gl-slot" id="slot-scene"></div><button class="fab" id="fabScene" title="Add a model to the scene" aria-label="Add a model to the scene">+</button></section>
    <section class="view" data-view="assets"><div class="assets-body" id="assetsBody"></div></section>
    <section class="view" data-view="edit"><div class="gl-slot" id="slot-edit"></div><div id="editHud"></div></section>
    <canvas id="rotBall" width="80" height="80" role="img" aria-label="Orbit gizmo — drag to rotate the view"></canvas>
    <div id="zoomKnob">
      <button class="zk-btn" id="zkIn" title="Zoom in">+</button>
      <input id="zkSlider" type="range" min="1" max="100" value="50">
      <button class="zk-btn" id="zkOut" title="Zoom out">−</button>
    </div>
    <div id="paintHud">
      <input type="color" id="phColor" value="#d8466a" title="Brush color">
      <input type="range" id="phSize" min="4" max="120" step="1" value="38" title="Brush size">
      <button id="phErase" title="Eraser">Erase</button>
      <button id="phEyedrop" title="Eyedropper: pick a color from the texture">⏺</button>
    </div>
    <div id="quickUndo">
      <button id="quUndo" title="Undo">↶</button>

// Frees GPU-side buffers for a deleted model. Safe to call even if something else still
// renders the same objects: THREE's dispose() only drops the cached GPU upload — the
// renderer transparently re-uploads from the intact CPU-side data next time it's drawn.
// Still, avoid disposing textures known to be actively shared elsewhere:
// - paint.tex is one long-lived canvas texture reused across every paint session
// - EM._srcTex is whatever texture the mesh editor currently has loaded/exports
// A model still placed in the Scene shares its geometry/material by reference with the
// placement (Object3D.clone() doesn't deep-clone them), so skip it entirely — its
// resources are still in active use there.
function disposeModelResources(m){
  var stillPlaced=sceneScene.userData.holder.children.some(function(c){return c.userData&&c.userData.placement&&c.userData.modelId===m.userData.id;});
  if(stillPlaced)return;
  m.userData.parts.forEach(function(p){
    if(p.baseGeo&&p.baseGeo!==p.mesh.geometry)p.baseGeo.dispose();
    if(p.mesh.geometry)p.mesh.geometry.dispose();
    var mat=p.mat;if(!mat)return;
    ['map','bumpMap','normalMap','roughnessMap','metalnessMap','emissiveMap'].forEach(function(k){
      var t=mat[k];if(t&&t!==paint.tex&&t!==EM._srcTex)t.dispose();});
    mat.dispose();});}

  var m=state.models[idx],wasActive=(state.activeId===id);
  state.models.splice(idx,1);

    if(next)setActiveModel(next.userData.id);
    else{var holder=viewerScene.userData.modelHolder;while(holder.children.length)holder.remove(holder.children[0]);invalidate();}}
  renderAssets();if(active.view==='viewer'||active.view==='paint')renderPanel();

  disposeModelResources(m);
  History.push(function(){state.models.splice(idx,0,m);if(wasActive)setActiveModel(id);renderAssets();renderPanel();},
    function(){var i2=state.models.findIndex(function(mm){return mm.userData.id===id;});if(i2>=0)state.models.splice(i2,1);

  var mesh=m.userData.parts[paint.part].mesh,cam=active.vs.cam,r=dom.getBoundingClientRect();

/* tiny offscreen renderer for library thumbnails (lazy; shares geometry/materials) */
var thumbGL=null,thumbScene=null,thumbCam=null;
function modelThumb(m){
  try{
    if(!thumbGL){
      thumbGL=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
      thumbGL.setSize(160,160);thumbGL.outputEncoding=THREE.sRGBEncoding;
      thumbScene=new THREE.Scene();
      var d1=new THREE.DirectionalLight(0xfff2e2,1.1);d1.position.set(2,3,2);thumbScene.add(d1);
      var d2=new THREE.DirectionalLight(0xbcd4ff,.45);d2.position.set(-2,1,-2);thumbScene.add(d2);
      thumbScene.add(new THREE.AmbientLight(0xffffff,.35));
      thumbCam=new THREE.PerspectiveCamera(35,1,.01,100);}
    thumbScene.environment=viewerScene.environment||null;
    var grp=new THREE.Group();
    m.userData.parts.forEach(function(p){grp.add(new THREE.Mesh(p.mesh.geometry,p.mat));});
    thumbScene.add(grp);
    var box=new THREE.Box3().setFromObject(grp);
    if(box.isEmpty()){thumbScene.remove(grp);return null;}
    var c=new THREE.Vector3();box.getCenter(c);var s=new THREE.Vector3();box.getSize(s);
    var r=Math.max(s.x,s.y,s.z)*.5||1;
    thumbCam.position.set(c.x+r*1.9,c.y+r*1.5,c.z+r*2.4);thumbCam.lookAt(c);
    thumbGL.render(thumbScene,thumbCam);
    var url=thumbGL.domElement.toDataURL('image/png');
    thumbScene.remove(grp);
    return url;
  }catch(e){return null;}}

  parts:m.userData.parts.map(function(p){var g=p.baseGeo;return {pos:Array.from(g.attributes.position.array),uv:g.attributes.uv?Array.from(g.attributes.uv.array):null,index:g.index?Array.from(g.index.array):null,

/* ----- autosave (localStorage, debounced) ----- */
var AUTOSAVE_KEY='roxyAutosave',autosaveTimer=null,autosaveWarned=false,autosaveSuspended=false;
function scheduleAutosave(){if(autosaveSuspended)return;clearTimeout(autosaveTimer);autosaveTimer=setTimeout(doAutosave,1500);}
function doAutosave(){
  if(!state.models.length){try{localStorage.removeItem(AUTOSAVE_KEY);}catch(e){}return;}
  try{localStorage.setItem(AUTOSAVE_KEY,JSON.stringify(buildProjectData(false)));return;}catch(e){}
  try{localStorage.setItem(AUTOSAVE_KEY,JSON.stringify(buildProjectData(true)));
    if(!autosaveWarned){autosaveWarned=true;toast('Autosave: textures too large, saved geometry only');}}
  catch(e){if(!autosaveWarned){autosaveWarned=true;toast('Autosave failed (storage full) — export a project.json to be safe');}}}
function clearAutosave(){try{localStorage.removeItem(AUTOSAVE_KEY);}catch(e){}toast('Autosave cleared');}
function tryRestoreAutosave(){
  var raw;try{raw=localStorage.getItem(AUTOSAVE_KEY);}catch(e){return false;}
  if(!raw)return false;
  var data;try{data=JSON.parse(raw);}catch(e){try{localStorage.removeItem(AUTOSAVE_KEY);}catch(e2){}return false;}
  if(!data||!data.models||!data.models.length)return false;
  autosaveSuspended=true;var ok=false;
  try{loadProject(data);toast('Restored autosave from last session');ok=true;}
  catch(e){try{localStorage.removeItem(AUTOSAVE_KEY);}catch(e2){}}
  autosaveSuspended=false;return ok;}
function loadProject(data){state.models.length=0;(data.models||[]).forEach(function(md){var parts=md.parts.map(function(pp){var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pp.pos,3));if(pp.uv)g.setAttribute('uv',new THREE.Float32BufferAttribute(pp.uv,2));if(pp.index)g.setIndex(pp.index);g.computeVertexNormals();
  var mat=makeMaterial({color:new THREE.Color(pp.color).getHex(),rough:pp.rough,metal:pp.metal});
  if(pp.emissive)mat.emissive.set(pp.emissive);if(pp.emInt!=null)mat.emissiveIntensity=pp.emInt;
  if(pp.opacity!=null){mat.opacity=pp.opacity;}if(pp.transmission&&'transmission' in mat)mat.transmission=pp.transmission;if(pp.clearcoat&&'clearcoat' in mat)mat.clearcoat=pp.clearcoat;
  mat.transparent=(mat.opacity<1)||(mat.transmission>0);
  if(pp.map){var im=new Image();im.onload=function(){var tx=new THREE.Texture(im);tx.encoding=THREE.sRGBEncoding;tx.needsUpdate=true;mat.map=tx;mat.color.setHex(0xffffff);mat.needsUpdate=true;invalidate();};im.src=pp.map;}
  return {geo:g,mat:mat};});
  var m=makeModel(md.name,parts);m.userData.mods=md.mods||[];rebuildModel(m);addModel(m);});
  if(data.scene&&data.scene.env)applyEnv(sceneScene,data.scene.env);
  if(state.models.length){setActiveModel(state.models[0].userData.id);}renderAssets();}

  var movedIdx=[],targetIdx=[];
  EM.V.forEach(function(v,i){var o=preDragSnap[i];if(!o)return;(v.equals(o)?targetIdx:movedIdx).push(i);});

      {dir:new THREE.Vector3().setFromMatrixColumn(cam.matrix,1),l:'Y',fc:'#9be0a3',bc:'#1f4a28'},
      {dir:new THREE.Vector3().setFromMatrixColumn(cam.matrix,2).negate(),l:'Z',fc:'#6cc6ff',bc:'#1a3d58'}

    var v2=new THREE.Vector3().fromBufferAttribute(posAttr,i2);
    var n=new THREE.Vector3().crossVectors(new THREE.Vector3().subVectors(v1,v0),new THREE.Vector3().subVectors(v2,v0)).normalize();
    if(n.lengthSq()<.01)n.set(0,1,0);
    var vns=[i0,i1,i2].map(function(vi){return norAttr?new THREE.Vector3().fromBufferAttribute(norAttr,vi):n.clone();});

      var S1x=origUVAttr.getX(boi[1])*1024;
      var S1y=glbSrc?origUVAttr.getY(boi[1])*1024:(1-origUVAttr.getY(boi[1]))*1024;

    paint.ctx.fillStyle='#ffffff';paint.ctx.fillRect(0,0,1024,1024);}

// Blender-style projection painting: discover every face under the brush and

function do3dPaint(clientX,clientY){

  ensureAtlasUVs(m,paint.part); // ensure per-face atlas UVs on any mesh type
  var mesh=m.userData.parts[paint.part].mesh,geo=mesh.geometry;
  var posAttr=geo.attributes.position,uvAttr=geo.attributes.uv;if(!uvAttr)return;
  var cam=active.vs.cam;cam.updateMatrixWorld();cam.matrixWorldInverse.copy(cam.matrixWorld).invert();

function buildNav(){var rail=$('#rail'),tab=$('#tabbar');VIEWS.forEach(function(v){
  rail.appendChild(el('button',{class:'tab','data-v':v[0],html:icon(ICONS[v[0]])+'<span>'+v[1]+'</span>',onclick:function(){setView(v[0]);}}));
  tab.appendChild(el('button',{class:'tab','data-v':v[0],html:icon(ICONS[v[0]])+'<span>'+v[1]+'</span>',
    onclick:function(){if(active.view===v[0])openSheet();else setView(v[0]);}}));});}
/* mobile sheet: tap toggles, drag follows the finger with velocity fling */
function openSheet(on){var p=$('#panel');if(on==null)on=!p.classList.contains('open');p.classList.toggle('open',on);}
(function(){var h=$('#sheetHandle'),p=$('#panel');
  var drag=false,moved=false,sy=0,y0=0,travel=0,vel=0,lastY=0,lastT=0;
  h.addEventListener('pointerdown',function(e){h.setPointerCapture(e.pointerId);
    travel=Math.max(1,p.getBoundingClientRect().height-48);
    y0=p.classList.contains('open')?0:travel;
    sy=lastY=e.clientY;lastT=performance.now();vel=0;drag=true;moved=false;
    p.style.transition='none';});
  h.addEventListener('pointermove',function(e){if(!drag)return;
    var dy=e.clientY-sy;if(Math.abs(dy)>6)moved=true;
    var t=performance.now(),dt=t-lastT;
    if(dt>0){vel=(e.clientY-lastY)/dt;lastY=e.clientY;lastT=t;}
    var y=Math.max(0,Math.min(travel,y0+dy));
    p.style.transform='translateY('+y+'px)';});
  function settle(e){if(!drag)return;drag=false;p.style.transition='';
    if(!moved){p.style.transform='';openSheet();return;}
    var y=Math.max(0,Math.min(travel,y0+(e.clientY-sy)));
    var open=Math.abs(vel)>.35?vel<0:y<travel*.5;
    p.classList.toggle('open',open);p.style.transform='';}
  h.addEventListener('pointerup',settle);
  h.addEventListener('pointercancel',function(){drag=false;p.style.transition='';p.style.transform='';});
})();
function frameCurrent(){
  if(active.view==='viewer'){var m=getModel(state.activeId);if(m)frameObject(m,active.vs);}
  else if(active.view==='edit'){if(EM._meshObj)frameObject(EM._meshObj,active.vs);}
  else if(active.view==='build'||active.view==='scene'){frameObject((active.view==='build'?buildScene:sceneScene).userData.holder,active.vs);}
  syncZoomKnob();invalidate();}

$('#btnRedo').addEventListener('click',function(){History.redo();});

$('#quRedo').addEventListener('click',function(){History.redo();});
$('#btnSnap').addEventListener('click',function(e){Gizmo.snap=!Gizmo.snap;e.currentTarget.className=Gizmo.snap?'act on':'act';
  toast(Gizmo.snap?(active.view==='edit'?'Snap on — snaps to nearby verts, falls back to grid':'Grid snap on'):'Snap off');});
window.addEventListener('keydown',function(e){var tag=(e.target&&e.target.tagName)||'';if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')return;
  var z=e.key.toLowerCase();
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&z==='z'){e.preventDefault();History.undo();}
  else if((e.ctrlKey||e.metaKey)&&(z==='y'||(e.shiftKey&&z==='z'))){e.preventDefault();History.redo();}
  else if(z>='1'&&z<='6'){setView(VIEWS[+z-1][0]);}
  else if(z==='f'){$('#btnFrame').click();}
  else if(active.view==='edit'){
    if(z==='a'){e.preventDefault();EM.selAll();}
    else if(z==='e'){e.preventDefault();EM.extrude();}
    else if(z==='i'){EM.inset();}
    else if(z==='b'){EM.bevelEdges();}
    else if(z==='l'){EM.selectLoops();}
    else if(z==='n'){EM.recalcNormals();}
    else if(z==='d'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();EM.duplicateSelection();}
    else if(z==='x'){EM.deleteSelected();}
    else if(z==='s'&&!e.ctrlKey&&!e.metaKey){EM.subdivide();renderPanel();}
  }});
$('#fabBuild').addEventListener('click',function(){addPrim('Cube');openSheet(true);});
$('#fabScene').addEventListener('click',function(){if(state.models.length){addPlacement(state.models[0].userData.id);openSheet(true);}else toast('No models yet');});

function syncZoomKnob(){
  var sl=$('#zkSlider');if(!sl||!active||!active.vs)return;
  var t=Math.log(active.vs.rad/0.6)/Math.log(100);
  sl.value=Math.round(100-clamp(t,0,1)*99);}
(function(){
  var sl=$('#zkSlider'),zi=$('#zkIn'),zo=$('#zkOut');if(!sl)return;
  function radFromSlider(v){var t=(100-+v)/99;return 0.6*Math.pow(100,t);}
  sl.addEventListener('input',function(){if(!active||!active.vs)return;active.vs.rad=clamp(radFromSlider(this.value),.6,60);updateCam();invalidate();});
  zi.addEventListener('click',function(){if(!active||!active.vs)return;active.vs.rad=clamp(active.vs.rad*.82,.6,60);updateCam();syncZoomKnob();invalidate();});
  zo.addEventListener('click',function(){if(!active||!active.vs)return;active.vs.rad=clamp(active.vs.rad/0.82,.6,60);updateCam();syncZoomKnob();invalidate();});
})();
RotBall.init();
var _restored=tryRestoreAutosave();
setView(_restored?'viewer':'edit');updUndo();
loop();
boot.style.display='none';
})();
