<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<title>Blaster Studio — a tiny 3D editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14100c;--ink:#f3ece4;--muted:#a8978a;--faint:#6f635a;--line:rgba(255,255,255,.10);
  --panel:rgba(24,19,15,.86);--card:rgba(255,255,255,.045);--pink:#ff8fb1;--pink2:#ff6f9c;--ok:#9be0b0;--err:#ff9b9b;
  --rail:64px;--side:320px;--bar:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
  font-family:"Space Grotesk",system-ui,sans-serif;font-size:14px}
button{font-family:inherit;color:var(--ink);cursor:pointer;border:1px solid var(--line);background:var(--card);
  border-radius:10px;padding:9px 11px;font-size:13px;transition:background .14s,border-color .14s,transform .04s}
button:hover{background:rgba(255,255,255,.10)}button:active{transform:translateY(1px)}
button:focus-visible{outline:2px solid var(--pink);outline-offset:2px}
button.pri{background:var(--pink);color:#2a141d;border-color:transparent;font-weight:600}
button.pri:hover{background:#ffa3c0}
button.on{background:rgba(255,143,177,.18);border-color:rgba(255,143,177,.45);color:#ffd4e2}
input[type=range]{width:100%;accent-color:var(--pink)}
input[type=text],input[type=number],select{font-family:inherit;font-size:13px;color:var(--ink);background:rgba(0,0,0,.28);
  border:1px solid var(--line);border-radius:9px;padding:8px 9px;width:100%}
input[type=color]{width:34px;height:30px;border:1px solid var(--line);border-radius:8px;background:none;padding:2px}
label.fld{display:block;font-size:11px;letter-spacing:.04em;color:var(--muted);margin:0 0 5px}
.spread{display:flex;gap:8px;align-items:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px}
.muted{color:var(--muted)}.small{font-size:11.5px}
hr.sep{border:none;border-top:1px solid var(--line);margin:12px 0}

#app{position:fixed;inset:0;display:grid;grid-template-columns:var(--rail) 1fr var(--side);grid-template-rows:var(--bar) 1fr;
  grid-template-areas:"bar bar bar" "rail stage panel";}
#bar{grid-area:bar;display:flex;align-items:center;gap:10px;padding:0 12px;border-bottom:1px solid var(--line);
  background:var(--panel);backdrop-filter:blur(12px);z-index:5}
#bar .logo{font:600 15px/1 "Fraunces",serif;letter-spacing:.01em}
#bar .dot{width:9px;height:9px;border-radius:50%;background:var(--pink);box-shadow:0 0 10px var(--pink)}
#bar .vtitle{font-size:12px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}
#bar .sp{flex:1}
#bar .act{padding:7px 9px;font-size:12px}

#rail{grid-area:rail;display:flex;flex-direction:column;gap:4px;padding:8px 6px;border-right:1px solid var(--line);background:var(--panel)}
#rail .tab{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;border-radius:12px;
  padding:9px 4px;color:var(--muted);font-size:9.5px;letter-spacing:.04em}
#rail .tab .ic{width:22px;height:22px;display:block}
#rail .tab.on{color:var(--ink);background:var(--card)}
#rail .tab.on .ic{filter:drop-shadow(0 0 6px rgba(255,143,177,.5))}

#stage{grid-area:stage;position:relative;overflow:hidden;background:
  radial-gradient(120% 120% at 50% 20%, #241b14 0%, #160f0b 60%, #0e0a07 100%)}
.view{position:absolute;inset:0;display:none}
.view.on{display:block}
.gl-slot{position:absolute;inset:0}
canvas{display:block;touch-action:none}

/* paint view split */
.view[data-view=paint]{display:none}
.view[data-view=paint].on{display:grid;grid-template-columns:1fr 360px}
.paint2d{position:relative;display:flex;align-items:center;justify-content:center;background:#0d0a07;overflow:hidden}
.paint2d canvas{max-width:96%;max-height:96%;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.paint-prev{position:relative;border-left:1px solid var(--line)}

#panel{grid-area:panel;border-left:1px solid var(--line);background:var(--panel);overflow:auto;padding:14px}
#panel h2{font:600 13px/1.1 "Space Grotesk";margin:0 0 2px}
#panel .sub{font-size:11.5px;color:var(--muted);margin:0 0 12px}
.section-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:14px 0 8px}

#tabbar{display:none}
#sheetHandle{display:none}

.assets-body{position:absolute;inset:0;overflow:auto;padding:18px}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:10px}
.thumb{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px}
.thumb .nm{font-weight:600}.thumb .mt{font-size:11px;color:var(--muted)}
.modlist{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.modrow{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 10px}
.modrow .top{display:flex;align-items:center;gap:8px}
.modrow .nm{flex:1;font-weight:500;font-size:12.5px}
.pill{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 7px}
.dbitem{display:flex;align-items:center;gap:8px;padding:8px 9px;border:1px solid var(--line);border-radius:10px;background:var(--card);margin-bottom:6px}
.dbitem .nm{flex:1}.dbitem .tg{font-size:10px;color:var(--faint)}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#241b14;border:1px solid var(--line);
  color:var(--ink);padding:9px 14px;border-radius:999px;font-size:12.5px;z-index:50;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.fab{position:absolute;right:16px;bottom:16px;width:52px;height:52px;border-radius:50%;background:var(--pink);color:#2a141d;
  border:none;font-size:24px;font-weight:600;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:6}
.chiprow{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;padding:7px 10px;border:1px solid var(--line);border-radius:999px;background:var(--card)}
.chip.on{background:rgba(255,143,177,.16);border-color:rgba(255,143,177,.4)}
#boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:99;
  font-size:14px;color:var(--muted);text-align:center;padding:24px}

/* ---------- mobile ---------- */
@media (max-width:820px){
  :root{--side:0px}
  #app{grid-template-columns:1fr;grid-template-rows:var(--bar) 1fr;grid-template-areas:"bar" "stage"}
  #rail{display:none}
  .view[data-view=paint].on{grid-template-columns:1fr;grid-template-rows:1fr}
  .paint-prev{display:none}
  #panel{position:fixed;left:0;right:0;bottom:0;top:auto;height:62vh;border-left:none;border-top:1px solid var(--line);
    border-radius:18px 18px 0 0;transform:translateY(calc(100% - 42px));transition:transform .26s cubic-bezier(.2,.8,.2,1);z-index:20;
    box-shadow:0 -16px 40px rgba(0,0,0,.5)}
  #panel.open{transform:translateY(0)}
  #sheetHandle{display:flex;align-items:center;justify-content:center;gap:8px;height:30px;margin:-4px -14px 8px;cursor:grab}
  #sheetHandle .bar{width:42px;height:4px;border-radius:99px;background:var(--faint)}
  #sheetHandle .lbl{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  #tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;height:58px;background:var(--panel);
    border-top:1px solid var(--line);z-index:30;padding-bottom:env(safe-area-inset-bottom)}
  #tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;
    border:none;color:var(--muted);font-size:9.5px;letter-spacing:.03em}
  #tabbar .tab .ic{width:21px;height:21px}
  #tabbar .tab.on{color:var(--pink)}
  #panel{bottom:58px}
  .fab{bottom:74px}
}
@media (max-width:820px){ .desktop-only{display:none} }
@media (min-width:821px){ .mobile-only{display:none} }
</style>
</head>
<body>
<div id="boot">loading studio…</div>

<div id="app" aria-hidden="false">
  <header id="bar">
    <span class="dot"></span><span class="logo">Blaster Studio</span>
    <span class="vtitle" id="vtitle">Viewer</span>
    <span class="sp"></span>
    <button class="act" id="btnFrame" title="Frame">Frame</button>
    <button class="act" id="btnShot" title="Screenshot">Shot</button>
  </header>

  <nav id="rail"></nav>

  <main id="stage">
    <section class="view on" data-view="viewer"><div class="gl-slot" id="slot-viewer"></div></section>
    <section class="view" data-view="paint">
      <div class="paint2d"><canvas id="paintCanvas" width="1024" height="1024"></canvas></div>
      <div class="paint-prev gl-slot" id="slot-paint"></div>
    </section>
    <section class="view" data-view="build"><div class="gl-slot" id="slot-build"></div><button class="fab" id="fabBuild">+</button></section>
    <section class="view" data-view="scene"><div class="gl-slot" id="slot-scene"></div><button class="fab" id="fabScene">+</button></section>
    <section class="view" data-view="assets"><div class="assets-body" id="assetsBody"></div></section>
  </main>

  <aside id="panel">
    <div id="sheetHandle"><span class="bar"></span><span class="lbl" id="sheetLbl">Tools</span></div>
    <div id="panelBody"></div>
  </aside>

  <nav id="tabbar"></nav>
</div>

<input type="file" id="fileModel" accept=".obj,.glb,.gltf" style="display:none">
<input type="file" id="fileImg" accept="image/*" style="display:none">
<input type="file" id="fileProj" accept=".json" style="display:none">
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
 onerror="document.getElementById('boot').textContent='Could not load Three.js (CDN blocked). Open this file in a normal browser tab.'"></script>
<script>
(function(){
"use strict";
var $=function(s,r){return (r||document).querySelector(s);};
var $$=function(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s));};
var boot=$('#boot');
if(typeof THREE==='undefined'){boot.textContent='Three.js failed to load.';return;}
function el(t,a,kids){var n=document.createElement(t);a=a||{};for(var k in a){if(k==='class')n.className=a[k];
  else if(k==='html')n.innerHTML=a[k];else if(k==='text')n.textContent=a[k];else if(k.slice(0,2)==='on')n.addEventListener(k.slice(2).toLowerCase(),a[k]);
  else n.setAttribute(k,a[k]);}(kids||[]).forEach(function(c){if(c==null)return;n.appendChild(typeof c==='string'?document.createTextNode(c):c);});return n;}

var ICONS={
 viewer:'<circle cx="12" cy="12" r="3.2"/><path d="M2 12s3.5-6.5 10-6.5S22 12 22 12s-3.5 6.5-10 6.5S2 12 2 12z"/>',
 paint:'<path d="M12 3a9 9 0 0 0 0 18c1 0 1.6-.8 1.6-1.7 0-1.2-1-1.6-1-2.6 0-.8.7-1.4 1.5-1.4H16a5 5 0 0 0 5-5c0-4-4-7.3-9-7.3z"/><circle cx="7.5" cy="11" r="1"/><circle cx="12" cy="7.5" r="1"/><circle cx="16.5" cy="11" r="1"/>',
 build:'<path d="M12 2l9 5-9 5-9-5 9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 17l9 5 9-5"/>',
 scene:'<rect x="2.5" y="6" width="13" height="9" rx="1.5"/><path d="M15.5 9l5-2.5v9L15.5 12"/>',

var VIEWS=[['viewer','Viewer'],['paint','Paint'],['build','Build'],['scene','Scene'],['assets','Assets']];

/* ---------------- renderer ---------------- */
var renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;

/* shared canvas helpers */
function dataURLtoU8(d){var b=atob(d.split(',')[1]);var u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}

/* fbm noise canvas */
function fbm(size,layers){var c=el('canvas');c.width=c.height=size;var g=c.getContext('2d');
  g.fillStyle='#808080';g.fillRect(0,0,size,size);g.globalCompositeOperation='overlay';
  layers.forEach(function(L){var sm=el('canvas');sm.width=sm.height=L.s;var sg=sm.getContext('2d');var im=sg.createImageData(L.s,L.s);
    for(var p=0;p<im.data.length;p+=4){var v=Math.random()*255;im.data[p]=im.data[p+1]=im.data[p+2]=v;im.data[p+3]=255;}

  if(srgb)t.encoding=THREE.sRGBEncoding;t.anisotropy=maxAniso;t.needsUpdate=true;return t;}

/* ---------------- environment presets ---------------- */
var ENVS=[
 {id:'studio',name:'Studio Warm',bg:'#160f0b',stops:[[0,'#fff6ea'],[.45,'#caa98f'],[1,'#1b130d']],cards:[[300,150,230,.95],[760,120,150,.7],[540,330,380,.32]],floor:true},
 {id:'sunset',name:'Sunset',bg:'#241019',stops:[[0,'#ffd9a0'],[.4,'#ff9e7a'],[.75,'#7a3b6b'],[1,'#241019']],cards:[[280,170,260,.85],[820,260,200,.45]],floor:true},
 {id:'overcast',name:'Soft Overcast',bg:'#cdd2d6',stops:[[0,'#ffffff'],[.5,'#d7dce0'],[1,'#9aa1a8']],cards:[[512,120,520,.5]],floor:true},
 {id:'night',name:'Night Blue',bg:'#06080f',stops:[[0,'#48618f'],[.5,'#1b2740'],[1,'#05070d']],cards:[[300,140,200,.6],[760,160,160,.4]],floor:true},
 {id:'paper',name:'White Studio',bg:'#f3efe6',stops:[[0,'#ffffff'],[.6,'#f2eee4'],[1,'#d9d2c4']],cards:[[380,150,360,.7],[700,200,260,.4]],floor:false},
 {id:'void',name:'Void',bg:'#000000',stops:[[0,'#222222'],[1,'#000000']],cards:[[400,160,300,.5]],floor:false}
];
var envCache={};
function buildEnvTex(p){if(envCache[p.id])return envCache[p.id];
  var c=el('canvas');c.width=1024;c.height=512;var g=c.getContext('2d');
  var gr=g.createLinearGradient(0,0,0,512);p.stops.forEach(function(s){gr.addColorStop(s[0],s[1]);});g.fillStyle=gr;g.fillRect(0,0,1024,512);
  (p.cards||[]).forEach(function(cd){var rg=g.createRadialGradient(cd[0],cd[1],0,cd[0],cd[1],cd[2]);
    rg.addColorStop(0,'rgba(255,255,255,'+cd[3]+')');rg.addColorStop(1,'rgba(255,255,255,0)');g.fillStyle=rg;g.beginPath();g.arc(cd[0],cd[1],cd[2],0,7);g.fill();});

  var env=pmrem.fromEquirectangular(t).texture;t.dispose();envCache[p.id]=env;return env;}

  scene.environment=buildEnvTex(p);scene.background=new THREE.Color(p.bg);scene.userData.envId=id;scene.userData.floor=p.floor;
  if(scene.userData.grid)scene.userData.grid.visible=!!p.floor&&scene.userData.showGrid!==false;}

/* ---------------- scenes ---------------- */
function studioLights(scene){
  var k=new THREE.DirectionalLight(0xfff0db,2.0);k.position.set(3.2,5,2.4);k.castShadow=true;
  k.shadow.mapSize.set(2048,2048);k.shadow.camera.near=.5;k.shadow.camera.far=20;
  k.shadow.camera.left=-5;k.shadow.camera.right=5;k.shadow.camera.top=5;k.shadow.camera.bottom=-5;k.shadow.bias=-.0004;k.shadow.radius=6;
  scene.add(k);var r=new THREE.DirectionalLight(0xa9c2ff,.6);r.position.set(-3,2.2,-3.4);scene.add(r);
  scene.add(new THREE.HemisphereLight(0xfff3e6,0x2a1d12,.22));scene.userData.keyLight=k;}
function addGround(scene){var g=new THREE.Mesh(new THREE.PlaneGeometry(60,60),new THREE.ShadowMaterial({opacity:.32}));
  g.rotation.x=-Math.PI/2;g.position.y=-0.001;g.receiveShadow=true;scene.add(g);
  var grid=new THREE.GridHelper(20,20,0x6b584a,0x3a2e25);grid.position.y=0;scene.add(grid);scene.userData.grid=grid;}

var viewerScene=new THREE.Scene();studioLights(viewerScene);applyEnv(viewerScene,'studio');viewerScene.userData.modelHolder=new THREE.Group();viewerScene.add(viewerScene.userData.modelHolder);

/* ---------------- cameras + orbit ---------------- */

var viewState={ // per-view orbit state
 viewer:{th:.7,ph:1.0,rad:4,tx:0,ty:0,tz:0,cam:mkCam()},

  else if(ptrs.size===2){var v=Array.from(ptrs.values());var d=Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y);var mid={x:(v[0].x+v[1].x)/2,y:(v[0].y+v[1].y)/2};
    if(lastDist)vs.rad=clamp(vs.rad*(lastDist/d),.6,60);lastDist=d;
    if(lastMid){var sp=Math.sin(vs.ph);var rightx=Math.cos(vs.th+Math.PI/2),rightz=Math.sin(vs.th+Math.PI/2);var k=vs.rad*.0016;
      vs.tx-=(mid.x-lastMid.x)*k*rightx + 0;vs.tz-=(mid.x-lastMid.x)*k*rightz;vs.ty+=(mid.y-lastMid.y)*k;}lastMid=mid;clickStart=null;}});

  if(clickStart&&clickStart.id===e.pointerId&&Date.now()-clickStart.t<350&&Math.hypot(e.clientX-clickStart.x,e.clientY-clickStart.y)<6){onViewportTap(e);}clickStart=null;}

  b.appendChild(el('button',{style:'width:100%;margin-top:8px',text:'Load sample: Donut',onclick:function(){var d=buildDonut();addModel(d);setActiveModel(d.userData.id);toast('Donut added');renderAssets();}}));}
function renderAssets(){var body=$('#assetsBody');body.innerHTML='';body.appendChild(el('h2',{style:'font:600 18px/1 \"Fraunces\",serif;margin:0 0 4px',text:'Project Library'}));
  body.appendChild(el('p',{class:'muted small',text:state.models.length+' model'+(state.models.length===1?'':'s')+' · static, no server, exports to your device'}));
  var grid=el('div',{class:'thumbs'});state.models.forEach(function(m){var parts=m.userData.parts.length;
    grid.appendChild(el('div',{class:'thumb'},[el('div',{class:'nm',text:m.userData.name}),el('div',{class:'mt',text:parts+' part'+(parts===1?'':'s')+' · '+m.userData.mods.length+' modifier'+(m.userData.mods.length===1?'':'s')}),
      el('div',{class:'grid2'},[el('button',{text:'Open',onclick:function(){setActiveModel(m.userData.id);setView('viewer');}}),el('button',{text:'To Scene',onclick:function(){addPlacement(m.userData.id);toast('Added to scene');}})]),
      el('button',{style:'width:100%',text:'Export .glb',onclick:function(){exportGLB(m,m.userData.name+'.glb');}})]));});
  body.appendChild(grid);}

/* ----- file inputs ----- */
var imgTarget='paint';
$('#fileModel').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();
  if(/\.obj$/i.test(f.name)){rd.onload=function(){try{var g=parseOBJ(rd.result);var m=makeModel(f.name.replace(/\.obj$/i,''),[{geo:g,mat:makeMaterial({color:0xcdb7a4,rough:.55})}]);addModel(m);setActiveModel(m.userData.id);setView('viewer');toast('Imported '+f.name);}catch(err){toast('OBJ import failed');console.error(err);}};rd.readAsText(f);}
  else{rd.onload=function(){try{var m=importGLB(rd.result);m.userData.name=f.name.replace(/\.(glb|gltf)$/i,'');addModel(m);setActiveModel(m.userData.id);setView('viewer');toast('Imported '+f.name);}catch(err){toast('GLB import failed (try .obj)');console.error(err);}};rd.readAsArrayBuffer(f);}
  e.target.value='';});
$('#fileImg').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){var img=new Image();img.onload=function(){
  if(imgTarget==='paint'){paint.ctx.globalCompositeOperation='source-over';paint.ctx.drawImage(img,0,0,1024,1024);paint.tex.needsUpdate=true;toast('Stamped image');}
  else{var m=getModel(state.activeId);if(m&&m.userData.parts[0]){var t=tex(img,true,[1,1]);m.userData.parts[0].mat.map=t;m.userData.parts[0].mat.color.setHex(0xffffff);m.userData.parts[0].mat.needsUpdate=true;toast('Texture applied');}}};img.src=rd.result;};rd.readAsDataURL(f);e.target.value='';});
$('#fileProj').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{loadProject(JSON.parse(rd.result));toast('Project loaded');}catch(err){toast('Bad project file');console.error(err);}};rd.readAsText(f);e.target.value='';});

/* ----- project save/load (geometry baked) ----- */
function saveProject(){var data={v:1,models:state.models.map(function(m){return {name:m.userData.name,
  parts:m.userData.parts.map(function(p){var g=p.baseGeo;return {pos:Array.from(g.attributes.position.array),uv:g.attributes.uv?Array.from(g.attributes.uv.array):null,index:g.index?Array.from(g.index.array):null,
    color:'#'+p.mat.color.getHexString(),rough:p.mat.roughness,metal:p.mat.metalness};}),mods:m.userData.mods};})};
  download(new Blob([JSON.stringify(data)],{type:'application/json'}),'project.json');}
function loadProject(data){state.models.length=0;(data.models||[]).forEach(function(md){var parts=md.parts.map(function(pp){var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pp.pos,3));if(pp.uv)g.setAttribute('uv',new THREE.Float32BufferAttribute(pp.uv,2));if(pp.index)g.setIndex(pp.index);g.computeVertexNormals();
  return {geo:g,mat:makeMaterial({color:new THREE.Color(pp.color).getHex(),rough:pp.rough,metal:pp.metal})};});
  var m=makeModel(md.name,parts);m.userData.mods=md.mods||[];rebuildModel(m);addModel(m);});
  if(state.models.length){setActiveModel(state.models[0].userData.id);}renderAssets();}

/* ----- viewport tap selection ----- */
function onViewportTap(e){var slot=curSlot();if(!slot)return;var r=dom.getBoundingClientRect();var mx=((e.clientX-r.left)/r.width)*2-1,my=-((e.clientY-r.top)/r.height)*2+1;
  var ray=new THREE.Raycaster();ray.setFromCamera({x:mx,y:my},active.vs.cam);
  if(active.view==='build'){var hit=ray.intersectObjects(buildScene.userData.holder.children,true)[0];if(hit){var o=hit.object;state.selBuild=o;renderPanel();}}
  else if(active.view==='scene'){var hs=ray.intersectObjects(sceneScene.userData.holder.children,true)[0];var hl=ray.intersectObjects(sceneScene.userData.lights.children,true)[0];
    if(hl){var lt=null;sceneScene.userData.lights.children.forEach(function(c){if(c===hl.object&&c.isMesh){sceneScene.userData.lights.children.forEach(function(L){if(L.userData&&L.userData.helper===c)lt=L;});}});if(lt){state.selLight=lt;state.selScene=null;renderPanel();return;}}
    if(hs){var top=hs.object;while(top.parent&&!top.userData.placement)top=top.parent;state.selScene=top;state.selLight=null;renderPanel();}}}

/* ---------------- nav build ---------------- */
function buildNav(){var rail=$('#rail'),tab=$('#tabbar');VIEWS.forEach(function(v){
  rail.appendChild(el('button',{class:'tab','data-v':v[0],html:icon(ICONS[v[0]])+'<span>'+v[1]+'</span>',onclick:function(){setView(v[0]);}}));
  tab.appendChild(el('button',{class:'tab','data-v':v[0],html:icon(ICONS[v[0]])+'<span>'+v[1]+'</span>',onclick:function(){setView(v[0]);openSheet(true);}}));});}
/* mobile sheet */
function openSheet(on){var p=$('#panel');if(on==null)on=!p.classList.contains('open');p.classList.toggle('open',on);}
$('#sheetHandle').addEventListener('click',function(){openSheet();});
$('#btnFrame').addEventListener('click',function(){if(active.view==='viewer'){var m=getModel(state.activeId);if(m)frameObject(m,active.vs);}else{var h=(active.view==='build'?buildScene:sceneScene).userData.holder;frameObject(h,active.vs);}});
$('#btnShot').addEventListener('click',function(){renderer.render(active.scene,active.vs.cam);downloadURL(renderer.domElement.toDataURL('image/png'),active.view+'_shot.png');toast('Saved screenshot');});
$('#fabBuild').addEventListener('click',function(){addPrim('Cube');openSheet(true);});
$('#fabScene').addEventListener('click',function(){if(state.models.length){addPlacement(state.models[0].userData.id);openSheet(true);}});

window.addEventListener('resize',resizeActive);

/* ---------------- init ---------------- */
buildNav();
var donut=buildDonut();addModel(donut);setActiveModel(donut.userData.id);
setView('viewer');
loop();
boot.style.display='none';
toast('Welcome — drag to orbit, tap an object to select');
})();
</script>
